services:
  # Ollama — local LLM server (Llama 4)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # PostgreSQL — checkpoints + post storage
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_vision
      POSTGRES_USER: svagent
      POSTGRES_PASSWORD: changeme_in_production
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svagent -d social_vision"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application — FastAPI + LangGraph
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: postgresql://svagent:changeme_in_production@postgres:5432/social_vision
    depends_on:
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ../output:/app/output
      - ../knowledge:/app/knowledge
      - ../images:/app/images
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  # Scheduler — runs weekly pipeline automatically
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: postgresql://svagent:changeme_in_production@postgres:5432/social_vision
    depends_on:
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ../output:/app/output
      - ../knowledge:/app/knowledge
      - ../images:/app/images
    command: ["python", "scheduler.py"]

volumes:
  ollama_data:
  pg_data:
